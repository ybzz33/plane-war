<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>忙陇聥莽聜麓忙潞聙忙戮露脩聞氓聻卢</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
canvas { display: block; position: absolute; top: 0; left: 0; }
#ui-layer {
  position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 10;
  padding: 12px 16px;
  display: flex; justify-content: space-between; align-items: flex-start;
}
.ui-panel {
  background: rgba(0,0,0,0.55); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
  padding: 8px 14px; color: #fff;
}
.ui-score { font-size: 14px; color: rgba(255,255,255,0.7); letter-spacing: 1px; }
.ui-score span { font-size: 22px; font-weight: bold; color: #ffd700; }
.ui-hp { display: flex; gap: 4px; align-items: center; }
.hp-heart { width: 18px; height: 18px; background: #ff4757; clip-path: polygon(50% 15%, 61% 0, 79% 0, 94% 15%, 100% 35%, 100% 55%, 82% 75%, 50% 100%, 18% 75%, 0 55%, 0 35%, 6% 15%, 21% 0, 39% 0); transition: opacity 0.3s; }
.hp-heart.lost { opacity: 0.2; }
#powerup-bar {
  position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; pointer-events: none; z-index: 10;
}
.powerup-icon {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; position: relative; background: rgba(0,0,0,0.65);
  border: 2px solid rgba(255,255,255,0.2);
}
.powerup-icon .timer-bar {
  position: absolute; bottom: 2px; left: 4px; right: 4px; height: 3px;
  background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden;
}
.powerup-icon .timer-fill {
  height: 100%; background: #ffd700; border-radius: 2px;
  transition: width 0.1s linear;
}
#charge-indicator {
  position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
  width: 120px; height: 8px; background: rgba(255,255,255,0.15); border-radius: 4px;
  overflow: hidden; display: none; z-index: 10; pointer-events: none;
}
#charge-fill {
  height: 100%; background: linear-gradient(90deg, #00bfff, #ff00ff);
  border-radius: 4px; width: 0%; transition: width 0.05s linear;
}
#game-over {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.75); z-index: 20;
}
#game-over.visible { display: flex; }
#game-over h2 { font-size: 36px; color: #ffd700; margin-bottom: 12px; text-shadow: 0 0 20px rgba(255,215,0,0.6); letter-spacing: 2px; }
#game-over .final-score { font-size: 18px; color: rgba(255,255,255,0.8); margin-bottom: 28px; }
#game-over .final-score b { font-size: 28px; color: #ffd700; }
#restart-btn {
  pointer-events: auto; background: linear-gradient(135deg, #ffd700, #ffaa00); border: none;
  color: #000; font-size: 18px; font-weight: bold; padding: 14px 44px; border-radius: 30px;
  letter-spacing: 1px; box-shadow: 0 4px 20px rgba(255,215,0,0.4); cursor: pointer;
  transition: transform 0.15s;
}
#restart-btn:active { transform: scale(0.95); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui-layer">
  <div class="ui-panel ui-score">氓炉掳忙楼聙氓聻聨 <span id="score">0</span></div>
  <div class="ui-panel ui-hp" id="hp-panel"></div>
</div>
<div id="powerup-bar"></div>
<div id="charge-indicator"><div id="charge-fill"></div></div>
<div id="game-over">
  <h2>氓篓聯氓聭聤氓聻聶莽录聛忙聮麓忙陆芦</h2>
  <div class="final-score">茅聫聢芒聜卢莽录聛氓聽聺莽路卤茅聧聮?<b id="final-score">0</b></div>
  <button id="restart-btn">茅聳虏氓露聠忙聼聤氓炉庐芒聜卢忙驴庐?/button>
</div>
<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const hpPanel = document.getElementById('hp-panel');
  const powerupBar = document.getElementById('powerup-bar');
  const chargeIndicator = document.getElementById('charge-indicator');
  const chargeFill = document.getElementById('charge-fill');
  const gameOverEl = document.getElementById('game-over');
  const finalScoreEl = document.getElementById('final-score');
  const restartBtn = document.getElementById('restart-btn');

  let W, H;
  let player, bullets, enemies, stars, particles, powerups, lasers;
  let score, hp, maxHp;
  let gameRunning, enemyTimer, enemyInterval, bulletTimer, bulletInterval;
  let shakeAmount, shakeDecay;
  let touchActive, touchX, touchY, touchStartTime, touchStartX, touchStartY;
  let charging, chargeLevel;
  let animId;

  // 茅聳卢忙聮鲁氓聫驴茅聬聵猫聢碌芒聜卢?  let activePowerups = {}; // { type: { remaining, ... } }
  const POWERUP_TYPES = {
    scatter:  { name: '茅聫聛茂陆聟莽職聽氓炉庐氓陆聮盲潞戮', icon: '茅娄聝莽聟聸', color: '#ffd700', duration: 10 },
    laser:    { name: '茅聮聝氓聥芦氓搂聫氓漏碌芒聜卢茅聧聫?, icon: '茅娄聝忙聲赂', color: '#00bfff', duration: 8 },
    reflect:  { name: '莽聮聬忙聺聭卯聲戮茅聧聶氓露聟莽職聽', icon: '茅娄聝莽聟聼', color: '#cc44ff', duration: 8 },
    heal:     { name: '茅聬垄莽聠路忙聡隆茅聨颅茫聢聽卯聵虏', icon: '茅娄聝莽聟聺', color: '#44ff44', duration: 0 },
    rapid:    { name: '茅聧聰莽聤禄芒聜卢莽聠路莽職聽茅聧聭?, icon: '茅聢驴?, color: '#ff8800', duration: 10 }
  };

  // 茅聢鹿芒聜卢茅聢鹿芒聜卢 茅聴聤猫聶芦忙聶楼莽禄炉猫聧陇莽虏潞 茅聢鹿芒聜卢茅聢鹿芒聜卢
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playTone(freq, duration, type, vol, glideTo) {
    try {
      const ctx = getAudioCtx();
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type || 'square';
      osc.frequency.setValueAtTime(freq, t);
      if (glideTo) osc.frequency.linearRampToValueAtTime(glideTo, t + duration);
      gain.gain.setValueAtTime(vol, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + duration);
    } catch(e) {}
  }

  function playShootSound() {
    playTone(800, 0.08, 'square', 0.06, 400);
  }

  function playExplosionSound() {
    try {
      const ctx = getAudioCtx();
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(30, t + 0.25);
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.25);
      // noise burst
      const noise = ctx.createOscillator();
      const ngain = ctx.createGain();
      noise.type = 'square';
      noise.frequency.setValueAtTime(60, t);
      noise.frequency.exponentialRampToValueAtTime(20, t + 0.15);
      ngain.gain.setValueAtTime(0.08, t);
      ngain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      noise.connect(ngain);
      ngain.connect(ctx.destination);
      noise.start(t);
      noise.stop(t + 0.15);
    } catch(e) {}
  }

  function playPickupSound() {
    playTone(600, 0.08, 'sine', 0.1, 1200);
    setTimeout(() => playTone(900, 0.08, 'sine', 0.1, 1600), 60);
  }

  function playLaserSound() {
    try {
      const ctx = getAudioCtx();
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(1200, t);
      osc.frequency.exponentialRampToValueAtTime(200, t + 0.4);
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.4);
    } catch(e) {}
  }

  function playChargeTickSound() {
    playTone(300 + Math.random() * 200, 0.05, 'sine', 0.03, 600);
  }

  // 茅聢鹿芒聜卢茅聢鹿芒聜卢 茅聫聞莽聠潞芒聰聳茅聭鲁氓卤戮忙芦聶 茅聢鹿芒聜卢茅聢鹿芒聜卢
  function initStars(count) {
    const arr = [];
    for (let i = 0; i < count; i++) {
      arr.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.8 + 0.4,
        speed: Math.random() * 0.6 + 0.15,
        twinkle: Math.random() * Math.PI * 2,
        twinkleSpeed: Math.random() * 0.03 + 0.008
      });
    }
    return arr;
  }

  function updateStars() {
    for (const s of stars) {
      s.y += s.speed;
      if (s.y > H + 5) { s.y = -5; s.x = Math.random() * W; }
      s.twinkle += s.twinkleSpeed;
    }
  }

  function drawStars() {
    for (const s of stars) {
      const alpha = 0.35 + Math.sin(s.twinkle) * 0.35;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${Math.max(0.1, alpha)})`;
      ctx.fill();
    }
  }

  // 茅聢鹿芒聜卢茅聢鹿芒聜卢 茅聬聹芒聲聛卯聠聧忙陇聥莽聜麓忙潞聙莽录聛忙篓潞氓聼聴 茅聢鹿芒聜卢茅聢鹿芒聜卢
  function drawPlayer(x, y, w, h) {
    ctx.save();
    ctx.translate(x, y);
    // 氓炉庐忙聸聼忙聬赂茅聬聫卯聜陇氓聤聶
    const flameLen = 10 + Math.random() * 8;
    const grd = ctx.createLinearGradient(0, h * 0.35, 0, h * 0.35 + flameLen);
    grd.addColorStop(0, '#ffaa00');
    grd.addColorStop(0.5, '#ff4400');
    grd.addColorStop(1, 'rgba(255,50,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.moveTo(-w * 0.18, h * 0.35);
    ctx.lineTo(0, h * 0.35 + flameLen);
    ctx.lineTo(w * 0.18, h * 0.35);
    ctx.fill();
    // 茅聫聢茅赂驴茅聼漏
    ctx.fillStyle = '#4da6ff';
    ctx.beginPath();
    ctx.moveTo(0, -h * 0.42);
    ctx.lineTo(w * 0.25, -h * 0.15);
    ctx.lineTo(w * 0.33, h * 0.12);
    ctx.lineTo(w * 0.25, h * 0.35);
    ctx.lineTo(-w * 0.25, h * 0.35);
    ctx.lineTo(-w * 0.33, h * 0.12);
    ctx.lineTo(-w * 0.25, -h * 0.15);
    ctx.closePath();
    ctx.fill();
    // 茅聫聢猫聶鹿猫聙聝
    ctx.fillStyle = '#3388dd';
    ctx.beginPath();
    ctx.moveTo(-w * 0.25, -h * 0.08);
    ctx.lineTo(-w * 0.48, h * 0.22);
    ctx.lineTo(-w * 0.28, h * 0.22);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(w * 0.25, -h * 0.08);
    ctx.lineTo(w * 0.48, h * 0.22);
    ctx.lineTo(w * 0.28, h * 0.22);
    ctx.closePath();
    ctx.fill();
    // 忙陇鹿茅鹿聝芒聰聮茅聭赂?    ctx.fillStyle = '#80d4ff';
    ctx.beginPath();
    ctx.ellipse(0, -h * 0.06, w * 0.13, h * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();
    // 忙楼聜忙篓潞氓聨聹
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.ellipse(-w * 0.04, -h * 0.12, w * 0.05, h * 0.08, 0, 0, Math.PI * 2);
    ctx.fill();

    // 茅聳卢忙聮鲁氓聫驴茅聧聫氓陇聦氓鹿聠
    if (activePowerups.scatter) {
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.6 + Math.sin(Date.now() / 150) * 0.3;
      ctx.beginPath();
      ctx.arc(0, 0, w * 0.7, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
    if (activePowerups.reflect) {
      ctx.strokeStyle = '#cc44ff';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.6 + Math.sin(Date.now() / 200) * 0.3;
      ctx.beginPath();
      ctx.arc(0, 0, w * 0.78, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
    if (activePowerups.rapid) {
      ctx.strokeStyle = '#ff8800';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.6 + Math.sin(Date.now() / 100) * 0.3;
      ctx.beginPath();
      ctx.arc(0, 0, w * 0.62, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }

  // 茅聢鹿芒聜卢茅聢鹿芒聜卢 茅聫聛氓卤戮忙潞聙莽录聛忙篓潞氓聼聴 茅聢鹿芒聜卢茅聢鹿芒聜卢
  function drawEnemy(x, y, w, h) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = '#ff4757';
    ctx.beginPath();
    ctx.moveTo(0, h * 0.45);
    ctx.lineTo(w * 0.22, -h * 0.2);
    ctx.lineTo(w * 0.3, h * 0.05);
    ctx.lineTo(w * 0.2, h * 0.45);
    ctx.lineTo(-w * 0.2, h * 0.45);
    ctx.lineTo(-w * 0.3, h * 0.05);
    ctx.lineTo(-w * 0.22, -h * 0.2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#cc2233';
    ctx.beginPath();
    ctx.moveTo(-w * 0.22, -h * 0.05);
    ctx.lineTo(-w * 0.44, h * 0.3);
    ctx.lineTo(-w * 0.22, h * 0.25);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(w * 0.22, -h * 0.05);
    ctx.lineTo(w * 0.44, h * 0.3);
    ctx.lineTo(w * 0.22, h * 0.25);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ff8080';
    ctx.beginPath();
    ctx.arc(0, -h * 0.05, w * 0.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // 茅聢鹿芒聜卢茅聢鹿芒聜卢 莽聙聸忙聞卢猫聞聤莽录聛忙篓潞氓聼聴 茅聢鹿芒聜卢茅聢鹿芒聜卢
  function drawBullet(x, y, w, h, color) {
    const c = color || '#ffd700';
    const grd = ctx.createLinearGradient(x, y - h, x, y);
    grd.addColorStop(0, c);
    grd.addColorStop(1, c === '#ffd700' ? '#ff8800' : c);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.roundRect(x - w / 2, y - h, w, h, w / 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,200,0.5)';
    ctx.beginPath();
    ctx.roundRect(x - w / 4, y - h * 1.3, w / 2, h * 0.6, w / 4);
    ctx.fill();
  }

  // 茅聢鹿芒聜卢茅聢鹿芒聜卢 茅聳卢忙聮鲁氓聫驴莽录聛忙篓潞氓聼聴 茅聢鹿芒聜卢茅聢鹿芒聜卢
  function drawPowerup(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    const r = p.r || 13;
    // 茅聧聫氓陇聥忙陋驴
    const glow = ctx.createRadialGradient(0, 0, r * 0.4, 0, 0, r * 1.3);
    glow.addColorStop(0, p.glowColor);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, r * 1.3, 0, Math.PI * 2);
    ctx.fill();
    // 忙露聯猫庐鲁莽露聥
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // 茅聫聜氓聸搂莽聯搂
    ctx.fillStyle = '#000';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.symbol, 0, 1);
    ctx.restore();
  }

  // 茅聢鹿芒聜卢茅聢鹿芒聜卢 氓漏碌芒聜卢茅聧聫氓陇聥忙陆芦莽录聛忙篓潞氓聼聴 茅聢鹿芒聜卢茅聢鹿芒聜卢
  function drawLaser(x, y, w, len) {
    const grd = ctx.createLinearGradient(x, y - len, x, y);
    grd.addColorStop(0, 'rgba(0,191,255,0)');
    grd.addColorStop(0.1, 'rgba(0,191,255,0.9)');
    grd.addColorStop(0.5, 'rgba(255,0,255,1)');
    grd.addColorStop(0.9, 'rgba(0,191,255,0.9)');
    grd.addColorStop(1, 'rgba(0,191,255,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(x - w / 2, y - len, w, len);
    // 忙露聯卯聟聻莽赂戮茅聬搂莽聲聦氓職聨
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillRect(x - w / 6, y - len, w / 3, len);
  }

  // 茅聢鹿芒聜卢茅聢鹿芒聜卢 茅聬聳氓聴聶氓聛垄莽禄庐忙聨聭莽聯聶 茅聢鹿芒聜卢茅聢鹿芒聜卢
  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 3 + 1.5;
      particles.push({
        x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        life: 1, decay: Math.random() * 0.04 + 0.025,
        r: Math.random() * 2.5 + 1, color
      });
    }
  }

  // 茅聢鹿芒聜卢茅聢鹿芒聜卢 莽潞掳莽聣聢忙聦聮氓娄芦芒聜卢氓篓麓?茅聢鹿芒聜卢茅聢鹿芒聜卢
  function rectCollide(a, b) {
    return (
      a.x - a.w / 2 < b.x + b.w / 2 &&
      a.x + a.w / 2 > b.x - b.w / 2 &&
      a.y - a.h / 2 < b.y + b.h / 2 &&
      a.y + a.h / 2 > b.y - b.h / 2
    );
  }

  function circleCollide(a, b) {
    const dx = a.x - b.x;
    const dy = a.y - b.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    return dist < (a.r || a.w / 2) + (b.r || b.w / 2);
  }

  // 茅聢鹿芒聜卢茅聢鹿芒聜卢 氓漏碌芒聜卢氓篓虏氓漏職盲潞戮茅聧聫?茅聢鹿芒聜卢茅聢鹿芒聜卢
  function activatePowerup(type) {
    const pt = POWERUP_TYPES[type];
    if (!pt) return;

    if (type === 'heal') {
      hp = Math.min(maxHp, hp + 1);
      updateHP();
      return;
    }

    // 忙驴隆氓聜聸莽聛聣氓庐赂猫聦卢莽虏隆氓漏碌芒聜卢氓篓虏盲录聶莽麓聺茅聧聮茅聰聥忙聼聤茅聫聝氓聽聲忙拢驴
    activePowerups[type] = { remaining: pt.duration, total: pt.duration };
    updatePowerupBar();

    if (type === 'laser') {
      // 茅聧聮忙驴聠卯聺聬茅聧聳忙聽卢忙聬芦茅聧聰忙露職氓搂赂茅聨卢?      charging = false;
      chargeLevel = 0;
    }
  }

  function updatePowerupBar() {
    let html = '';
    for (const [type, data] of Object.entries(activePowerups)) {
      const pt = POWERUP_TYPES[type];
      const pct = Math.round((data.remaining / data.total) * 100);
      html += `<div class="powerup-icon" style="border-color:${pt.color}">
        ${pt.icon}
        <div class="timer-bar"><div class="timer-fill" style="width:${pct}%;background:${pt.color}"></div></div>
      </div>`;
    }
    powerupBar.innerHTML = html;
  }

  // 茅聢鹿芒聜卢茅聢鹿芒聜卢 茅聬垄莽聠赂氓聻職茅聳卢忙聮鲁氓聫驴 茅聢鹿芒聜卢茅聢鹿芒聜卢
  function spawnPowerup(x, y) {
    if (Math.random() > 0.35) return; // 35% 茅聨潞氓陇聨忙聝陇氓搂聮氓聜聹氓路录

    const types = ['scatter', 'laser', 'reflect', 'heal', 'rapid'];
    const weights = [25, 20, 25, 15, 15];
    const total = weights.reduce((a, b) => a + b, 0);
    let rand = Math.random() * total;
    let chosen = types[0];
    for (let i = 0; i < types.length; i++) {
      rand -= weights[i];
      if (rand <= 0) { chosen = types[i]; break; }
    }

    const pt = POWERUP_TYPES[chosen];
    powerups.push({
      type: chosen,
      x: x, y: y,
      r: 13,
      vy: 1.2 + Math.random() * 0.8,
      color: pt.color,
      glowColor: pt.color,
      symbol: pt.icon
    });
  }

  // 茅聢鹿芒聜卢茅聢鹿芒聜卢 茅聧聮忙驴聠卯聺聬茅聧聳?/ 茅聳虏氓露聡莽聳聠 茅聢鹿芒聜卢茅聢鹿芒聜卢
  function reset() {
    resize();
    player = { x: W / 2, y: H * 0.78, w: 40, h: 48 };
    bullets = [];
    enemies = [];
    particles = [];
    powerups = [];
    lasers = [];
    stars = initStars(120);
    score = 0;
    hp = maxHp = 3;
    gameRunning = true;
    enemyInterval = 900;
    bulletInterval = 160;
    enemyTimer = 0;
    bulletTimer = 0;
    shakeAmount = 0;
    shakeDecay = 0.9;
    touchActive = false;
    charging = false;
    chargeLevel = 0;
    activePowerups = {};
    gameOverEl.classList.remove('visible');
    chargeIndicator.style.display = 'none';
    chargeFill.style.width = '0%';
    powerupBar.innerHTML = '';
    updateHP();
    updateScore();
  }

  function updateHP() {
    let html = '';
    for (let i = 0; i < maxHp; i++) {
      html += `<div class="hp-heart${i >= hp ? ' lost' : ''}"></div>`;
    }
    hpPanel.innerHTML = html;
  }

  function updateScore() {
    scoreEl.textContent = score;
  }

  function endGame() {
    gameRunning = false;
    finalScoreEl.textContent = score;
    gameOverEl.classList.add('visible');
    chargeIndicator.style.display = 'none';
  }

  // 茅聢鹿芒聜卢茅聢鹿芒聜卢 忙露聯莽禄聵莽聢露茅聨麓氓驴聯忙聝聤茅聬聹?茅聢鹿芒聜卢茅聢鹿芒聜卢
  function gameLoop(ts) {
    if (!gameRunning) { animId = requestAnimationFrame(gameLoop); return; }

    const dt = 16.67;

    // 茅聫聡氓颅聵忙聼聤茅聳卢忙聮鲁氓聫驴莽聮聛芒聞聝忙陇聜
    for (const type of Object.keys(activePowerups)) {
      activePowerups[type].remaining -= dt / 1000;
      if (activePowerups[type].remaining <= 0) {
        delete activePowerups[type];
        if (type === 'laser') {
          charging = false;
          chargeLevel = 0;
          chargeIndicator.style.display = 'none';
        }
      }
    }
    updatePowerupBar();

    // 茅聭路卯聛聞氓搂漏莽聛聫氓聥芦氓職庐
    const curInterval = activePowerups.rapid ? bulletInterval / 2 : bulletInterval;
    bulletTimer += dt;
    if (bulletTimer >= curInterval) {
      bulletTimer = 0;
      playShootSound();

      if (activePowerups.scatter) {
        // 3茅聧聶忙聢聻忙職聨氓炉庐?        bullets.push({ x: player.x, y: player.y - player.h / 2, w: 4, h: 14, vx: -2.5, vy: -8 });
        bullets.push({ x: player.x, y: player.y - player.h / 2, w: 4, h: 14, vx: 0, vy: -8 });
        bullets.push({ x: player.x, y: player.y - player.h / 2, w: 4, h: 14, vx: 2.5, vy: -8 });
      } else {
        bullets.push({ x: player.x, y: player.y - player.h / 2, w: 4, h: 14, vx: 0, vy: -8 });
      }
    }

    // 茅聮聝氓聥芦氓搂聫茅聳芦忙聵聫莽路芦茅聰聸氓聽聼莽赂潞茅聧聫氓陇聥莽赂潞氓篓虏莽禄聵忙陇聜茅聰聸?    if (activePowerups.laser && touchActive) {
      const dx = touchX - touchStartX;
      const dy = touchY - touchStartY;
      const moved = Math.sqrt(dx * dx + dy * dy);
      if (moved < 15) {
        // 茅聨碌氓卢芦氓炉職氓篓聦芒聙鲁茫聛聡茅陋聻氓聭炉脨漏茅聧聰卯聼聮莽麓聺茅聮聝氓聥芦氓搂聫
        if (!charging) {
          charging = true;
          chargeLevel = 0;
          chargeIndicator.style.display = 'block';
        }
        chargeLevel = Math.min(1, chargeLevel + dt / 800);
        chargeFill.style.width = (chargeLevel * 100) + '%';
        if (Math.floor(chargeLevel * 10) !== Math.floor((chargeLevel - dt / 800) * 10)) {
          playChargeTickSound();
        }
      } else {
        // 茅聨碌氓卢芦氓炉職莽禄聣猫炉虏氓搂漏忙碌聹氓聴颅莽麓聺茅聧聶忙聽篓莽搂路茅聮聝氓聥芦氓搂聫
        charging = false;
        chargeLevel = 0;
        chargeIndicator.style.display = 'none';
        chargeFill.style.width = '0%';
      }
      // 茅聫聡氓颅聵忙聼聤 touchStart 忙碌拢氓露聡莽聳聠茅聳卢氓聻庐氓聨陇莽禄卤卯聢聹脨聺
      touchStartX = touchX;
      touchStartY = touchY;
    } else if (!touchActive && charging) {
      // 茅聫聣莽聜卢氓垄聹茅聳虏氓漏聝忙聳聛氓漏碌芒聜卢茅聧聫?      if (chargeLevel > 0.15) {
        const laserW = 10 + chargeLevel * 25;
        lasers.push({
          x: player.x, y: player.y - player.h / 2,
          w: laserW, len: H, life: 0.35,
          damage: Math.ceil(chargeLevel * 3)
        });
        playLaserSound();
        shakeAmount = Math.max(shakeAmount, chargeLevel * 6);
      }
      charging = false;
      chargeLevel = 0;
      chargeIndicator.style.display = 'none';
      chargeFill.style.width = '0%';
    }

    // 茅聫聛氓卤戮忙潞聙茅聬垄莽聠赂氓聻職
    enemyTimer += dt;
    if (enemyTimer >= enemyInterval) {
      enemyTimer = 0;
      const margin = 20;
      const ex = margin + Math.random() * (W - margin * 2);
      enemies.push({ x: ex, y: -30, w: 36, h: 40, speed: 1.5 + Math.random() * 2.5 });
      enemyInterval = Math.max(400, enemyInterval - 3);
    }

    // 茅聫聡氓颅聵忙聼聤茅聫聞莽聠赂忙搂娄
    updateStars();

    // 茅聫聡氓颅聵忙聼聤莽聙聸忙聞卢猫聞聤
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += (b.vx || 0);
      b.y += (b.vy || -8);
      // 莽聮聬忙聺聭卯聲戮茅聧聶氓露聟莽職聽
      if (activePowerups.reflect) {
        if (b.x - b.w / 2 <= 0) { b.vx = Math.abs(b.vx); b.x = b.w / 2; }
        if (b.x + b.w / 2 >= W) { b.vx = -Math.abs(b.vx); b.x = W - b.w / 2; }
        if (b.y < b.h && b.vy < 0) { b.vy = Math.abs(b.vy); }
      }
      if (b.y < -20 || b.y > H + 20 || b.x < -20 || b.x > W + 20) {
        bullets.splice(i, 1);
      }
    }

    // 茅聫聡氓颅聵忙聼聤茅聫聛氓卤戮忙潞聙
    for (let i = enemies.length - 1; i >= 0; i--) {
      enemies[i].y += enemies[i].speed;
      if (enemies[i].y > H + 50) enemies.splice(i, 1);
    }

    // 茅聫聡氓颅聵忙聼聤茅聳卢忙聮鲁氓聫驴
    for (let i = powerups.length - 1; i >= 0; i--) {
      powerups[i].y += powerups[i].vy;
      if (powerups[i].y > H + 30) powerups.splice(i, 1);
    }

    // 茅聫聡氓颅聵忙聼聤氓漏碌芒聜卢茅聧聫?    for (let i = lasers.length - 1; i >= 0; i--) {
      lasers[i].life -= dt / 1000;
      if (lasers[i].life <= 0) lasers.splice(i, 1);
    }

    // 莽聙聸忙聞卢猫聞聤 vs 茅聫聛氓卤戮忙潞聙
    for (let b = bullets.length - 1; b >= 0; b--) {
      let bulletHit = false;
      for (let e = enemies.length - 1; e >= 0; e--) {
        if (rectCollide(bullets[b], enemies[e])) {
          playExplosionSound();
          spawnParticles(enemies[e].x, enemies[e].y, '#ff4757', 14);
          spawnPowerup(enemies[e].x, enemies[e].y);
          enemies.splice(e, 1);
          bulletHit = true;
          score += 10;
          updateScore();
          shakeAmount = Math.max(shakeAmount, 3);
          break;
        }
      }
      if (bulletHit) { bullets.splice(b, 1); }
    }

    // 氓漏碌芒聜卢茅聧聫?vs 茅聫聛氓卤戮忙潞聙
    for (const laser of lasers) {
      for (let e = enemies.length - 1; e >= 0; e--) {
        const en = enemies[e];
        if (Math.abs(en.x - laser.x) < laser.w / 2 + en.w / 2 && en.y < laser.y && en.y > laser.y - laser.len) {
          playExplosionSound();
          spawnParticles(en.x, en.y, '#ff4757', 14);
          spawnPowerup(en.x, en.y);
          enemies.splice(e, 1);
          score += 10;
          updateScore();
        }
      }
    }

    // 茅聫聛氓卤戮忙潞聙 vs 茅聬聹芒聲聛卯聠聧
    for (let e = enemies.length - 1; e >= 0; e--) {
      if (rectCollide(player, enemies[e])) {
        spawnParticles(enemies[e].x, enemies[e].y, '#ff4757', 18);
        spawnParticles(player.x, player.y, '#4da6ff', 12);
        enemies.splice(e, 1);
        hp--;
        updateHP();
        shakeAmount = Math.max(shakeAmount, 8);
        playExplosionSound();
        if (hp <= 0) { endGame(); break; }
      }
    }

    // 茅聬聹芒聲聛卯聠聧 vs 茅聳卢忙聮鲁氓聫驴
    for (let p = powerups.length - 1; p >= 0; p--) {
      if (circleCollide(player, powerups[p])) {
        playPickupSound();
        activatePowerup(powerups[p].type);
        powerups.splice(p, 1);
      }
    }

    // 茅聫聡氓颅聵忙聼聤莽禄庐忙聨聭莽聯聶
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // 茅聴聡氓聸搂莽聺聠莽聬聸忙聺驴氓聶潞
    if (shakeAmount > 0.05) shakeAmount *= shakeDecay; else shakeAmount = 0;

    // 茅聢鹿芒聜卢茅聢鹿芒聜卢 氓篓聯氓聫聣莽聟聥 茅聢鹿芒聜卢茅聢鹿芒聜卢
    ctx.clearRect(0, 0, W, H);
    const sx = shakeAmount > 0 ? (Math.random() - 0.5) * shakeAmount * 2 : 0;
    const sy = shakeAmount > 0 ? (Math.random() - 0.5) * shakeAmount * 2 : 0;

    ctx.save();
    ctx.translate(sx, sy);

    drawStars();

    // 莽禄庐忙聨聭莽聯聶
    for (const p of particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 氓漏碌芒聜卢茅聧聫?    for (const l of lasers) {
      drawLaser(l.x, l.y, l.w, l.len);
    }

    // 茅聫聛氓卤戮忙潞聙
    for (const e of enemies) drawEnemy(e.x, e.y, e.w, e.h);

    // 茅聳卢忙聮鲁氓聫驴
    for (const p of powerups) drawPowerup(p);

    // 莽聙聸忙聞卢猫聞聤
    for (const b of bullets) {
      let color = '#ffd700';
      if (activePowerups.scatter) color = '#ffd700';
      if (activePowerups.reflect) color = '#cc44ff';
      drawBullet(b.x, b.y, b.w, b.h, color);
    }

    // 茅聬聹芒聲聛卯聠聧
    drawPlayer(player.x, player.y, player.w, player.h);

    ctx.restore();

    animId = requestAnimationFrame(gameLoop);
  }

  // 茅聢鹿芒聜卢茅聢鹿芒聜卢 莽聭聶茂赂陆氓赂露 茅聢鹿芒聜卢茅聢鹿芒聜卢
  function onTouchStart(e) {
    e.preventDefault();
    const t = e.touches[0];
    touchActive = true;
    touchX = t.clientX;
    touchY = t.clientY;
    touchStartX = t.clientX;
    touchStartY = t.clientY;
    touchStartTime = Date.now();

    if (!gameRunning) return;
    player.x = touchX;

    // 茅聧聮忙驴聠卯聺聬茅聧聳忙聽颅莽聟露茅聫聛氓聽聹莽卢聜忙露聯氓卢芦忙聻聝茅聰聸氓聽楼忙赂露莽聭聲盲陆潞忙聲陇茅聨麓猫聹聜忙掳娄忙碌聹忙聨聭忙聜聴茅聨碌氓露聢氓聟聵忙碌拢猫路篓忙聲陇茅聰聸?    getAudioCtx();
  }

  function onTouchMove(e) {
    e.preventDefault();
    if (!touchActive || !gameRunning) return;
    const t = e.touches[0];
    const dx = t.clientX - touchX;
    const dy = t.clientY - touchY;
    player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x + dx));
    player.y = Math.max(player.h / 2, Math.min(H - player.h / 2, player.y + dy));
    touchX = t.clientX;
    touchY = t.clientY;
  }

  function onTouchEnd(e) {
    e.preventDefault();
    touchActive = false;
  }

  // 茅聢鹿芒聜卢茅聢鹿芒聜卢 忙娄搂莽聤鲁莽聢拢 茅聢鹿芒聜卢茅聢鹿芒聜卢
  function onMouseDown(e) {
    if (!gameRunning) return;
    touchActive = true;
    touchX = e.clientX;
    touchY = e.clientY;
    touchStartX = e.clientX;
    touchStartY = e.clientY;
    touchStartTime = Date.now();
    player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, e.clientX));
    player.y = Math.max(player.h / 2, Math.min(H - player.h / 2, e.clientY));
    getAudioCtx();
  }

  function onMouseMove(e) {
    if (!gameRunning) return;
    if (touchActive) {
      const dx = e.clientX - touchX;
      const dy = e.clientY - touchY;
      player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x + dx));
      player.y = Math.max(player.h / 2, Math.min(H - player.h / 2, player.y + dy));
    }
    touchX = e.clientX;
    touchY = e.clientY;
  }

  function onMouseUp(e) {
    touchActive = false;
  }

  // 茅聢鹿芒聜卢茅聢鹿芒聜卢 忙碌聹氓卢漏忙卢垄莽录聛忙聢聺莽聲戮 茅聢鹿芒聜卢茅聢鹿芒聜卢
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);

  restartBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (animId) cancelAnimationFrame(animId);
    reset();
    animId = requestAnimationFrame(gameLoop);
  });

  window.addEventListener('resize', () => {
    resize();
    stars = initStars(120);
    player.x = Math.min(player.x, W - player.w / 2);
    player.y = Math.min(player.y, H - player.h / 2);
  });

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
  }

  // 茅聢鹿芒聜卢茅聢鹿芒聜卢 茅聧職卯聢職氓搂漏 茅聢鹿芒聜卢茅聢鹿芒聜卢
  reset();
  animId = requestAnimationFrame(gameLoop);
})();
</script>
</body>
</html>
